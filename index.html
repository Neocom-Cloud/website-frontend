<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeoCom</title>
    <meta
      name="description"
      content="NeoCom redirects visitors to the best localized version of the site."
    />
    <meta name="robots" content="noindex,follow" />
    <link rel="canonical" href="https://neocom.cloud/" />
    <link rel="alternate" hreflang="x-default" href="https://neocom.cloud/" />
    <link rel="alternate" hreflang="pt-BR" href="https://neocom.cloud/pt-br/" />
    <link rel="alternate" hreflang="en" href="https://neocom.cloud/en/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />
  </head>
  <body class="locale-shell">
    <div class="locale-shell-card" id="locale-shell">
      <img
        alt="NeoCom"
        class="locale-shell-logo"
        src="/assets/NeoCom_Icon_Final_v2.svg"
      />
      <h1 class="locale-shell-title">Loading NeoCom</h1>
      <p class="locale-shell-copy">
        Choosing the best language for this visit and redirecting to the
        localized site.
      </p>
      <div class="shell-loader" aria-hidden="true"></div>
    </div>
    <script type="module" src="/src/root-entry.ts"></script>
  </body>
</html>
