name: CI

on:
  push:
    branches:
      - develop
      - Q.A
      - main
      - deploy
  pull_request:

jobs:
  workflow-lint:
    name: Validate GitHub Actions workflows
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Lint workflow definitions
        uses: docker://rhysd/actionlint:1.7.12

  promotion-policy:
    name: Validate promotion path
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify pull request source branch
        env:
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
        run: node scripts/verify-promotion.mjs

  test-and-build:
    name: Test and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test:ci

      - name: Build
        run: pnpm build

      - name: Verify deployment output
        run: pnpm test:build-output

      - name: Upload QA build artifact
        if: github.event_name == 'pull_request' || github.ref == 'refs/heads/Q.A'
        uses: actions/upload-artifact@v7
        with:
          name: neocom-site-${{ github.sha }}
          path: ./dist
          if-no-files-found: error
          retention-days: 14
